<style>
/* ═══════════════ DESIGN: Industrial Utilitarian ═══════════════ */
:root {
  --bg-app:#0a0e14; --bg-sidebar:#0d1117; --bg-main:#f5f3ef; --bg-card:#ffffff;
  --bg-input:#f8f7f4; --bg-row-alt:#faf9f7; --bg-modal:#ffffff;
  --text-primary:#1a1a18; --text-secondary:#6b6a65; --text-muted:#9a9995;
  --text-sidebar:#8b949e; --text-sidebar-active:#e6edf3;
  --accent:#d4820a; --accent-light:#f5a623; --positive:#1b7d46; --negative:#c0392b;
  --border:#e0ded8; --border-light:#eeede9;
  --shadow:0 1px 3px rgba(0,0,0,0.06); --shadow-lg:0 8px 30px rgba(0,0,0,0.12);
  --radius:6px; --radius-sm:4px;
  --font-mono:'SF Mono','Cascadia Code','JetBrains Mono','Consolas',monospace;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;
  --sidebar-w:240px; --header-h:48px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); background:var(--bg-app); color:var(--text-primary); display:flex; height:100vh; overflow:hidden; }

/* Sidebar */
.sidebar { width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--bg-sidebar); display:flex; flex-direction:column; border-right:1px solid #1c2128; z-index:10; }
.sidebar-brand { padding:16px 18px; border-bottom:1px solid #1c2128; display:flex; align-items:center; gap:10px; }
.sidebar-brand .icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; }
.sidebar-brand .title { font-size:14px; font-weight:700; color:var(--text-sidebar-active); letter-spacing:-0.3px; }
.sidebar-brand .sub { font-size:10px; color:var(--text-sidebar); margin-top:1px; }
.sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
.nav-section { margin-bottom:6px; }
.nav-section-title { padding:10px 18px 4px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); opacity:0.7; }
.nav-item { display:flex; align-items:center; gap:8px; padding:8px 18px; cursor:pointer; font-size:13px; color:var(--text-sidebar); transition:all 0.15s; border-left:2px solid transparent; user-select:none; }
.nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text-sidebar-active); }
.nav-item.active { background:rgba(212,130,10,0.08); color:var(--accent-light); border-left-color:var(--accent); font-weight:600; }
.nav-item .nav-icon { font-size:14px; width:18px; text-align:center; }
.sidebar-footer { padding:12px 18px; border-top:1px solid #1c2128; font-size:11px; color:var(--text-sidebar); display:flex; justify-content:space-between; }

/* Main */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header { height:var(--header-h); min-height:var(--header-h); background:var(--bg-card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; justify-content:space-between; box-shadow:var(--shadow); }
.header h1 { font-size:16px; font-weight:700; }
.header-actions { display:flex; gap:8px; align-items:center; }
.header-date { font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }
.content { flex:1; overflow-y:auto; padding:20px; background:var(--bg-main); }

/* Cards */
.card { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border-light); margin-bottom:16px; }
.card-header { padding:14px 18px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; }
.card-header h2 { font-size:14px; font-weight:700; }
.card-body { padding:18px; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.15s; font-family:inherit; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#fff; } .btn-primary:hover { background:#b87008; }
.btn-outline { background:#fff; color:var(--text-primary); border:1px solid var(--border); } .btn-outline:hover { background:var(--bg-input); }
.btn-danger { background:#fff; color:var(--negative); border:1px solid #f0d0d0; } .btn-danger:hover { background:#fef2f2; }
.btn-success { background:var(--positive); color:#fff; } .btn-success:hover { background:#156a36; }
.btn-sm { padding:4px 10px; font-size:12px; } .btn-xs { padding:2px 8px; font-size:11px; }

/* Tables */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { background:var(--bg-input); padding:10px 12px; text-align:left; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-secondary); border-bottom:2px solid var(--border); white-space:nowrap; }
.data-table td { padding:9px 12px; border-bottom:1px solid var(--border-light); }
.data-table tbody tr:hover { background:rgba(212,130,10,0.04); }
.data-table .num { text-align:right; font-family:var(--font-mono); font-size:12px; }
.data-table .center { text-align:center; }

/* Forms */
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:var(--text-secondary); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; background:var(--bg-input); transition:border-color 0.15s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(212,130,10,0.1); }
.form-row { display:flex; gap:12px; } .form-row>*{flex:1;}
.form-inline { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--bg-modal); border-radius:var(--radius); box-shadow:var(--shadow-lg); width:720px; max-width:92vw; max-height:85vh; overflow-y:auto; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-size:15px; font-weight:700; }
.modal-body { padding:20px; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
.close-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); padding:4px; line-height:1; }

/* KPI */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:20px; }
.kpi-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; border:1px solid var(--border-light); box-shadow:var(--shadow); }
.kpi-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; }
.kpi-value { font-size:24px; font-weight:800; font-family:var(--font-mono); letter-spacing:-1px; }
.kpi-value.positive { color:var(--positive); } .kpi-value.negative { color:var(--negative); } .kpi-value.neutral { color:var(--text-primary); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-success { background:#e6f4ea; color:var(--positive); } .badge-warning { background:#fef3e0; color:var(--accent); } .badge-danger { background:#fce8e6; color:var(--negative); } .badge-info { background:#e3f0fa; color:#1a56db; }

/* Search */
.search-input { padding:7px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; width:200px; background:var(--bg-input); }
.search-input:focus { outline:none; border-color:var(--accent); }
select.filter-select { padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; background:var(--bg-input); }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
.tab { padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; user-select:none; }
.tab:hover { color:var(--text-primary); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.total-row td { font-weight:700; border-top:2px solid var(--border); background:var(--bg-input); }
.hidden { display:none !important; }
.section-title { font-size:14px; font-weight:700; margin:16px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border-light); }
.org-tree { margin-left:0; }
.org-level { margin-left:20px; margin-bottom:4px; padding:6px 10px; border-left:2px solid var(--accent); font-size:13px; }
.org-level.level-0 { margin-left:0; border-left-color:var(--text-primary); font-weight:700; font-size:15px; }
.org-level.level-1 { border-left-color:var(--accent); font-weight:600; }
.org-level.level-2 { border-left-color:var(--accent-light); }
.org-level.level-3 { border-left-color:var(--text-muted); }
.pay-slip { border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:720px; margin:0 auto; }
.pay-slip h2 { text-align:center; margin-bottom:16px; }
.pay-slip table { width:100%; }
.pay-slip .divider td { border-top:2px solid var(--text-primary); }
</style>

<script>
/* ═══════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════ */

const STATE = { currentPage:'employees', editingId:null, currentUser:null };

// ═══════════════════════════════════════════════
//  VERSION CHECK — Free vs Pro
// ═══════════════════════════════════════════════
function isFree(){ return STATE.license && STATE.license.tier === 1; }
function isPro(){ return STATE.license && STATE.license.tier === 2; }
function getLimits(){ return isFree() ? {employees:20,attendances:500,payroll:12} : null; }
function checkLimit(type){ const l=getLimits(); if(!l) return false; const m={'employees':employees,'attendances':attendances,'payroll':payrollRecords.length}; const d=m[type]; return d&&d>=l[type]; }

// ═══════════════════════════════════════════════
//  LICENSE SYSTEM — Offline Key Verification
// ═══════════════════════════════════════════════
const LICENSE_SECRET = "TaiwanSME-ERP-HR-2026-AutoClaw";
const PRODUCT_CODE = 2; // 1=ERP, 2=HR

async function verifyLicenseAsync(key,company){
  if(!key||!company) return {valid:false,reason:'請輸入金鑰與公司名稱'};
  const parts=key.trim().split('-');
  if(parts.length!==4) return {valid:false,reason:'金鑰格式錯誤（需為 XXXX-XXXX-XXXX-XXXX）'};
  const h=(parts[0]+parts[1]+parts[2]).toUpperCase();
  const expiry=parts[3];
  const tierNames={1:'免費版',2:'專業版',3:'企業版'};
  for(let tier=1;tier<=3;tier++){
    const body=new TextEncoder().encode(`${PRODUCT_CODE}|${tier}|${company}|${expiry}|${LICENSE_SECRET}`);
    const hashBuffer=await crypto.subtle.digest('SHA-256',body);
    const hashArray=Array.from(new Uint8Array(hashBuffer));
    const hashHex=hashArray.map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
    if(hashHex.startsWith(h)){
      if(expiry!=='999999'){
        const y=parseInt('20'+expiry.slice(0,2));
        const m=parseInt(expiry.slice(2,4))-1;
        const d=parseInt(expiry.slice(4,6));
        const expDate=new Date(y,m,d);
        if(new Date()>expDate) return {valid:false,reason:'授權已過期（'+expDate.toLocaleDateString('zh-TW')+'）'};
      }
      return {valid:true,tier,tierName:tierNames[tier],company,key,expiry:expiry==='999999'?'永久':expiry};
    }
  }
  return {valid:false,reason:'金鑰無效，請確認金鑰與公司名稱正確'};
}

function showLicenseModal(errMsg){
  const h=`<div class="modal-header"><h3>🔑 授權啟用 — 人力資源與薪資管理系統</h3></div>

      <div class="form-group"><label>公司名稱</label><input id="licCompany" placeholder="請輸入公司名稱"></div>

    </div>
    <div class="modal-footer" style="flex-wrap:wrap;justify-content:space-between;">
      <div style="font-size:11px;color:var(--text-muted);padding:6px 0;">📞 02-26293721 | 📧 janson168@gmail.com</div>

        <button class="btn btn-outline" onclick="activateFree()">🎁 啟用免費版</button>
        <button class="btn btn-primary" onclick="activateLicense()">🔐 驗證並啟用</button>

    </div>`;
  document.getElementById('modalBox').innerHTML=h;
  document.getElementById('modalOverlay').classList.remove('hidden');

async function activateFree(){
  const company=document.getElementById('licCompany').value.trim()||'免費試用';
  const lic={id:'license',company:company,key:'FREE-TRIAL-0000-999999',tier:1,tierName:'免費版',expiry:'永久',valid:true};
  await dbSave('license',[lic]);
  location.reload();
}

async function activateLicense(){
  const company=document.getElementById('licCompany').value.trim();
  const key=document.getElementById('licKey').value.trim();
  if(!company){ document.getElementById('licError').textContent='請輸入公司名稱'; return; }
  if(!key){ document.getElementById('licError').textContent='請輸入授權金鑰'; return; }
  const result=await verifyLicenseAsync(key,company);
  if(!result.valid){ document.getElementById('licError').textContent=result.reason; return; }
  const lic={id:'license',company:result.company,key:result.key,tier:result.tier,tierName:result.tierName,expiry:result.expiry};
  await dbSave('license',[lic]);
  location.reload();
}

// ═══════════════════════════════════════════════
//  PROFESSIONAL V2.0 — IndexedDB + Login
// ═══════════════════════════════════════════════
let DB=null;
function openDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open('HR_DB',2);req.onupgradeneeded=(e)=>{const db=e.target.result;['employees','salaryStructures','attendances','leaves','overtimes','payrollRecords','users'].forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});});if(!db.objectStoreNames.contains('license'))db.createObjectStore('license',{keyPath:'id'});};req.onsuccess=(e)=>{DB=e.target.result;resolve(DB);};req.onerror=()=>reject(req.error);});}
async function dbLoad(store){return new Promise((resolve)=>{const tx=DB.transaction(store,'readonly');const os=tx.objectStore(store);const req=os.getAll();req.onsuccess=()=>resolve(req.result);req.onerror=()=>resolve([]);});}
async function dbSave(store,data){return new Promise((resolve)=>{const tx=DB.transaction(store,'readwrite');const os=tx.objectStore(store);os.clear();data.forEach(d=>os.put(d));tx.oncomplete=()=>resolve();});}
async function load(k,f){if(!DB)return f;try{const d=await dbLoad(k);if(d&&d.length>0)return d;}catch(e){}try{const v=localStorage.getItem('hr_'+k);if(v){const d=JSON.parse(v);if(d.length>0){await dbSave(k,d);localStorage.removeItem('hr_'+k);return d;}}}catch(e){}return f;}
async function save(k,d){if(!DB)return;await dbSave(k,d);}
async function migrateData(){await openDB();for(const k of ['employees','salaryStructures','attendances','leaves','overtimes','payrollRecords']){const d=await dbLoad(k);if(!d||d.length===0){const raw=localStorage.getItem('hr_'+k);if(raw){try{const p=JSON.parse(raw);if(p&&p.length>0){await dbSave(k,p);localStorage.removeItem('hr_'+k);}}catch(e){}}}}}
async function initUsers(){const users=await dbLoad('users');if(!users||users.length===0){await dbSave('users',[{id:'admin',username:'admin',password:'admin123',role:'管理員'}]);}}
function showLogin(){const h='<div class="modal-header"><h3>🔐 登入 — HR 薪資管理 專業版 V2.0</h3></div><div class="modal-body"><div class="form-group"><label>帳號</label><input id="loginUser" autofocus></div><div class="form-group"><label>密碼</label><input type="password" id="loginPass"></div><div id="loginError" style="color:var(--negative);font-size:12px;margin-top:8px;"></div></div><div class="modal-footer"><button class="btn btn-primary" onclick="doLogin()">登入</button></div>';document.getElementById('modalBox').innerHTML=h;document.getElementById('modalOverlay').classList.remove('hidden');document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});}
async function doLogin(){const u=document.getElementById('loginUser').value.trim();const p=document.getElementById('loginPass').value;const users=await dbLoad('users');const found=users.find(x=>x.username===u&&x.password===p);if(found){STATE.currentUser=found;sessionStorage.setItem('hr_user',JSON.stringify(found));closeModal();renderPage();}else{document.getElementById('loginError').textContent='帳號或密碼錯誤';}}

// ── Organizational Hierarchy (per user spec) ──
const TITLES_MGMT = ['董事長/總經理','經理','主任','課長','組長','職員'];
const TITLES_TECH = ['總工程師','工程師','技術士','技術員'];
const ALL_TITLES = [...TITLES_MGMT, ...TITLES_TECH];
const DEPTS = ['管理部','財務會計部','業務部','生產製造部','研發技術部','品管部','人資部'];
const LEAVE_TYPES = ['特休假','病假','事假','生理假','產假/陪產假','婚假','喪假','公假','補休'];

// ── Default Employees ──

// ── Taiwan Insurance Grade Tables (2025 ver) ──
// Simplified: monthly insured salary brackets
function getInsuranceGrade(salary) {
  const m = Math.max(0, Math.floor(salary/100)*100);
  const grades = [0,1500,3000,4500,6000,7500,8700,9900,11100,12600,14100,15600,17100,18600,20100,21600,23100,24600,26100,27600,28800,30000,31800,33300,34800,36300,38200,40100,42000,43900,45800];
  for (let i=grades.length-1; i>=0; i--) { if (m >= grades[i]) return grades[i]; }
  return 0;
}
// 勞保費率 12% (雇主70% 勞工20% 政府10%) — simplified: employee portion ~2.4%
function calcLaborInsurance(grade) {
  return Math.round(grade * 0.024);
}
// 健保費率 5.17% (雇主60% 勞工30% 政府10%) — employee portion ~1.55%
function calcHealthInsurance(grade) {
  return Math.round(grade * 0.0155);
}
// 勞退提撥 6% (employer only, from base salary)
function calcLaborPension(baseSalary) {
  return Math.round(baseSalary * 0.06);
}

// ── Income Tax Withholding Table (simplified monthly) ──
function calcTaxWithholding(grossPay, dependents) {
  // Simplified: standard deduction + salary deduction approach
  const monthlyNet = Math.max(0, grossPay - 88000 - (dependents||0)*9200);
  if (monthlyNet <= 56000) return 0;
  if (monthlyNet <= 126000) return Math.round((monthlyNet-56000)*0.05);
  if (monthlyNet <= 252000) return Math.round(3500+(monthlyNet-126000)*0.12);
  if (monthlyNet <= 472000) return Math.round(18620+(monthlyNet-252000)*0.20);
  return Math.round(62620+(monthlyNet-472000)*0.30);
}

  const savedLicense = await dbLoad('license');
  if(!savedLicense||savedLicense.length===0){

  attendances = await load('attendances', []);
  leaves = await load('leaves', []);
  overtimes = await load('overtimes', []);
  payrollRecords = await load('payrollRecords', []);

  // Free version: auto-login, skip login screen
  if (STATE.license && STATE.license.tier === 1) {

    sessionStorage.setItem('hr_user', JSON.stringify({id:'free', username:'訪客', role:'免費版'}));

function $(s){return document.querySelector(s);}

function fmtMoney(n){return Number(n).toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(d){const dt=new Date(d);return `${dt.getFullYear()}/${(dt.getMonth()+1).toString().padStart(2,'0')}/${dt.getDate().toString().padStart(2,'0')}`;}
function genId(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);}
function empName(id){const e=employees.find(x=>x.id===id);return e?`${e.code} ${e.name}`:'—';}

  if(isFree()){
    const limits=getLimits();
    const names={employees:'員工',attendances:'出勤記錄',payroll:'薪資月份'};

      }
    }
  }
  document.getElementById('pageTitle').textContent=pageTitles[page]||page;
  updateToolbar();
  const c=document.getElementById('mainContent');
  switch(page){
    case 'employees': c.innerHTML=renderEmployees(); break;
    case 'org-chart': c.innerHTML=renderOrgChart(); break;
    case 'attendance': c.innerHTML=renderAttendance(); break;
    case 'leave': c.innerHTML=renderLeave(); break;
    case 'overtime': c.innerHTML=renderOvertime(); break;
    case 'salary-structure': c.innerHTML=renderSalaryStructure(); break;
    case 'payroll': c.innerHTML=renderPayroll(); break;

    default: c.innerHTML='<div class="card"><div class="card-body" style="text-align:center;padding:40px;color:var(--text-muted);">請選擇功能模組</div></div>';
  }

}

function saveEmployee(){
  const code=document.getElementById('eCode').value.trim();
  const name=document.getElementById('eName').value.trim();
  if(!code||!name) return alert('請填寫編號與姓名');
  const data={id:STATE.editingId||genId(),code,name,
    idNumber:document.getElementById('eIdNo').value,gender:document.getElementById('eGender').value,
    birthDate:document.getElementById('eBirth').value,hireDate:document.getElementById('eHire').value,
    dept:document.getElementById('eDept').value,title:document.getElementById('eTitle').value,
    phone:document.getElementById('ePhone').value,email:document.getElementById('eEmail').value,
    addr:document.getElementById('eAddr').value,bankAcct:document.getElementById('eBank').value,
    status:document.getElementById('eStatus').value};
  if(STATE.editingId){const i=employees.findIndex(x=>x.id===STATE.editingId);if(i>=0)employees[i]=data;}
  else{employees.push(data);}
  save('employees',employees);closeModal();renderPage();
}

function deleteEmployee(id){
  if(!confirm('確定刪除此員工？'))return;
  employees=employees.filter(x=>x.id!==id);
  save('employees',employees);renderPage();
}

function renderOrgChart(){
  let h=`<div class="card"><div class="card-header"><h2>組織架構圖</h2><span style="font-size:12px;color:var(--text-muted);">依部門與職稱階層</span></div><div class="card-body">`;

  // Build tree by department -> title hierarchy
  const titleOrder = [...ALL_TITLES];
  for(const dept of DEPTS){
    const deptEmps = employees.filter(e=>e.dept===dept&&e.status==='在職');
    if(deptEmps.length===0) continue;
    h+=`<div class="section-title">${dept}（${deptEmps.length}人）</div>`;
    // Sort by title hierarchy
    deptEmps.sort((a,b)=>titleOrder.indexOf(a.title)-titleOrder.indexOf(b.title));
    let lastTitle='';
    for(const e of deptEmps){
      const levelIdx = titleOrder.indexOf(e.title);
      const levelClass = levelIdx<=1?'level-0 level-1':(levelIdx<=3?'level-2':'level-3');
      if(e.title!==lastTitle){
        h+=`<div class="org-level ${levelClass}" style="font-weight:600;margin-top:6px;">📌 ${e.title}</div>`;
        lastTitle=e.title;
      }
      h+=`<div class="org-level ${levelClass}" style="margin-left:24px;">${e.code} ${e.name} — ${e.phone}</div>`;
    }
  }

  h+=`</div></div>`;
  return h;
}

    for(const p of existing){
      h+=`<tr><td>${empName(p.employeeId)}</td><td class="num">${fmtMoney(p.baseSalary)}</td><td class="num">${fmtMoney(p.allowances)}</td><td class="num">${fmtMoney(p.overtimePay)}</td><td class="num" style="font-weight:600;">${fmtMoney(p.grossPay)}</td><td class="num">${fmtMoney(p.laborInsurance)}</td><td class="num">${fmtMoney(p.healthInsurance)}</td><td class="num">${fmtMoney(p.laborPension)}</td><td class="num">${fmtMoney(p.taxWithholding)}</td><td class="num" style="font-weight:700;font-size:14px;color:var(--positive);">${fmtMoney(p.netPay)}</td></tr>`;
    }
    h+=`</tbody></table>`;
  } else {
    h+=`<div style="text-align:center;padding:30px;color:var(--text-muted);">尚未產生 ${ym.replace('-','/')} 薪資記錄，請點擊上方按鈕產生</div>`;
  }

  h+=`</div></div>`;
  return h;
}

function generatePayroll(){
  const ymInput=document.getElementById('payYM')?.value;
  if(!ymInput) return;
  const ymKey=ymInput.replace('-','');
  // Remove existing records for this month
  payrollRecords=payrollRecords.filter(p=>p.yearMonth!==ymKey);

  for(const emp of employees.filter(e=>e.status==='在職')){
    const sal=salaryStructures.find(s=>s.employeeId===emp.id);
    if(!sal) continue;
    const allowances=sal.positionAllowance+sal.mealAllowance+sal.otherAllowance;
    // Calculate overtime for this month
    const monthOvertimes=overtimes.filter(o=>{
      const m=getYearMonth(o.date).replace('/','');
      return o.employeeId===emp.id && m===ymKey;
    });
    let overtimePay=0;
    const hourRate=Math.round(sal.baseSalary/30/8);
    for(const o of monthOvertimes){
      overtimePay+=o.hours<=2?Math.round(o.hours*hourRate*1.34):Math.round(2*hourRate*1.34+(o.hours-2)*hourRate*1.67);
    }

    const grossPay=sal.baseSalary+allowances+overtimePay;
    const insGrade=getInsuranceGrade(sal.baseSalary);
    const laborInsurance=calcLaborInsurance(insGrade);
    const healthInsurance=calcHealthInsurance(insGrade);
    const laborPension=calcLaborPension(sal.baseSalary); // employer portion (for reference)
    const taxWithholding=calcTaxWithholding(grossPay,1);
    const netPay=grossPay-laborInsurance-healthInsurance-taxWithholding;

    payrollRecords.push({id:genId(),employeeId:emp.id,yearMonth:ymKey,
      baseSalary:sal.baseSalary,allowances,overtimePay,grossPay,
      laborInsurance,healthInsurance,laborPension,taxWithholding,netPay});
  }
  save('payrollRecords',payrollRecords);
  renderPage();
}

function renderAnnualSummary(){
  const now=new Date();
  const year=(document.getElementById('asYear')?.value)||now.getFullYear();

  let h=`<div class="card"><div class="card-header"><h2>年度薪資彙總</h2>
    <div style="display:flex;gap:8px;">
      <select class="filter-select" id="asYear" onchange="renderPage()">${[now.getFullYear(),now.getFullYear()-1].map(y=>`<option value="${y}" ${y==year?'selected':''}>${y-1911} 年（${y}）</option>`).join('')}</select>
      <select class="filter-select" id="asEmp" onchange="renderPage()"><option value="">全部員工</option>${employees.filter(e=>e.status==='在職').map(e=>`<option value="${e.id}">${e.code} ${e.name}</option>`).join('')}</select>
    </div></div><div class="card-body">`;

  const asEmp=document.getElementById('asEmp')?.value||'';
  const yearRecords=payrollRecords.filter(p=>p.yearMonth.startsWith(String(year))&&(!asEmp||p.employeeId===asEmp));

  if(yearRecords.length===0){
    h+=`<div style="text-align:center;padding:30px;color:var(--text-muted);">${year-1911} 年尚無薪資記錄</div>`;
  } else {
    // Aggregate per employee
    const summary={};
    for(const r of yearRecords){
      if(!summary[r.employeeId]) summary[r.employeeId]={gross:0,net:0,months:0};
      summary[r.employeeId].gross+=r.grossPay;
      summary[r.employeeId].net+=r.netPay;
      summary[r.employeeId].months++;
    }

    let totalGross=0,totalNet=0;
    h+=`<table class="data-table"><thead><tr><th>員工</th><th>部門</th><th class="num">計薪月份</th><th class="num">年度應發合計</th><th class="num">年度實發合計</th><th class="num">月均薪資</th></tr></thead><tbody>`;
    for(const [eid,data] of Object.entries(summary)){
      const emp=employees.find(e=>e.id===eid);
      totalGross+=data.gross; totalNet+=data.net;
      h+=`<tr><td>${emp?emp.code+' '+emp.name:'—'}</td><td>${emp?emp.dept:'—'}</td><td class="num">${data.months}</td><td class="num">${fmtMoney(data.gross)}</td><td class="num" style="color:var(--positive);">${fmtMoney(data.net)}</td><td class="num">${fmtMoney(Math.round(data.gross/data.months))}</td></tr>`;
    }
    h+=`<tr class="total-row"><td colspan="3"><strong>合計</strong></td><td class="num"><strong>${fmtMoney(totalGross)}</strong></td><td class="num" style="color:var(--positive);"><strong>${fmtMoney(totalNet)}</strong></td><td class="num"></td></tr>`;
    h+=`</tbody></table>`;
  }
  h+=`</div></div>`;
  return h;
}

// ═══════════════════════════════════════════════
//  EXCEL EXPORT / IMPORT
// ═══════════════════════════════════════════════
function expXLSX(data,fn){if(!data||data.length===0){alert('無資料可匯出');return;}const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Sheet1');XLSX.writeFile(wb,fn+'.xlsx');}
function impXLSX(cb){const i=document.createElement('input');i.type='file';i.accept='.xlsx,.xls';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const d=XLSX.utils.sheet_to_json(ws);if(d.length===0){alert('無資料');return;}cb(d);}catch(err){alert('讀取失敗:'+err.message);}};r.readAsArrayBuffer(f);};i.click();}

function updateToolbar(){
  const t=document.getElementById('toolbarArea');if(!t)return;
  const p=STATE.currentPage;let h='';
  const eb=(fn,lb)=>`<button class="btn btn-outline btn-sm" onclick="${fn}">📥 ${lb}</button>`;
  const ib=(fn,lb)=>`<button class="btn btn-outline btn-sm" onclick="${fn}">📤 ${lb}</button>`;
  switch(p){
    case 'employees': h=eb("exportEmployees()","匯出員工")+ib("importEmployees()","匯入員工"); break;
    case 'attendance': h=eb("exportAttendance()","匯出出勤")+ib("importAttendance()","匯入出勤"); break;
    case 'leave': h=eb("exportLeave()","匯出請假")+ib("importLeave()","匯入請假"); break;
    case 'overtime': h=eb("exportOvertime()","匯出加班")+ib("importOvertime()","匯入加班"); break;
    case 'salary-structure': h=eb("exportSalaryStructure()","匯出薪資結構"); break;
    case 'payroll': h=eb("exportPayroll()","匯出薪資"); break;
    case 'payslip': h=eb("exportPayroll()","匯出薪資"); break;
    case 'annual-summary': h=eb("exportAnnualSummary()","匯出年度彙總"); break;
  }
  t.innerHTML=h;
}

function exportEmployees(){ expXLSX(employees.map(e=>({編號:e.code,姓名:e.name,身分證:e.idNumber,性別:e.gender,出生日期:e.birthDate,到職日期:e.hireDate,部門:e.dept,職稱:e.title,電話:e.phone,Email:e.email,地址:e.addr,銀行帳戶:e.bankAcct,狀態:e.status})),'員工基本資料'); }
function exportAttendance(){ expXLSX(attendances.map(a=>({日期:a.date,員工:empName(a.employeeId),上班:a.checkIn,下班:a.checkOut,狀態:a.status,備註:a.note||''})),'出勤記錄'); }
function exportLeave(){ expXLSX(leaves.map(l=>({員工:empName(l.employeeId),類型:l.type,起日:l.startDate,迄日:l.endDate,時數:l.hours,狀態:l.status,原因:l.reason||''})),'請假記錄'); }
function exportOvertime(){ expXLSX(overtimes.map(o=>({日期:o.date,員工:empName(o.employeeId),類型:o.type,時數:o.hours,備註:o.note||''})),'加班記錄'); }
function exportSalaryStructure(){ expXLSX(salaryStructures.map(s=>{ const e=empFull(s.employeeId); return {編號:e?e.code:'',姓名:e?e.name:'',部門:e?e.dept:'',本薪:s.baseSalary,職務加給:s.positionAllowance,伙食津貼:s.mealAllowance,其他津貼:s.otherAllowance,月薪合計:s.baseSalary+s.positionAllowance+s.mealAllowance+s.otherAllowance}; }),'薪資結構'); }
function exportPayroll(){ expXLSX(payrollRecords.map(p=>({年月:p.yearMonth,員工:empName(p.employeeId),本薪:p.baseSalary,津貼合計:p.allowances,加班費:p.overtimePay,應發合計:p.grossPay,勞保費:p.laborInsurance,健保費:p.healthInsurance,勞退提撥:p.laborPension,所得稅:p.taxWithholding,實發金額:p.netPay})),'薪資記錄'); }
function exportAnnualSummary(){ const now=new Date(); const y=(document.getElementById('asYear')?.value)||now.getFullYear(); const ae=document.getElementById('asEmp')?.value||''; const yr=payrollRecords.filter(p=>p.yearMonth.startsWith(String(y))&&(!ae||p.employeeId===ae)); const sum={}; yr.forEach(r=>{ if(!sum[r.employeeId])sum[r.employeeId]={gross:0,net:0,months:0}; sum[r.employeeId].gross+=r.grossPay; sum[r.employeeId].net+=r.netPay; sum[r.employeeId].months++; }); const d=[]; for(const[eid,s]of Object.entries(sum)){ const e=employees.find(x=>x.id===eid); d.push({員工:e?e.code+' '+e.name:'',部門:e?e.dept:'',計薪月份:s.months,年度應發合計:s.gross,年度實發合計:s.net,月均薪資:Math.round(s.gross/s.months)}); } expXLSX(d,'年度薪資彙總_'+y); }

function importEmployees(){ impXLSX(data=>{ data.forEach(r=>{ if(r.編號&&r.姓名){ const ex=employees.find(e=>e.code===String(r.編號)); const nd={code:String(r.編號),name:r.姓名,idNumber:r.身分證||'',gender:r.性別||'男',birthDate:r.出生日期||'',hireDate:r.到職日期||'',dept:r.部門||'',title:r.職稱||'職員',phone:r.電話||'',email:r.Email||'',addr:r.地址||'',bankAcct:r.銀行帳戶||'',status:r.狀態||'在職'}; if(ex){Object.assign(ex,nd);}else{employees.push({id:genId(),...nd});} } }); save('employees',employees); renderPage(); }); }
function importAttendance(){ impXLSX(data=>{ data.forEach(r=>{ if(r.日期&&r.員工){ const eid=employees.find(e=>(e.code+' '+e.name)===r.員工||e.name===r.員工); if(eid){ attendances.push({id:genId(),date:r.日期,employeeId:eid.id,checkIn:r.上班||'',checkOut:r.下班||'',status:r.狀態||'正常',note:r.備註||''}); } } }); save('attendances',attendances); renderPage(); }); }
function importLeave(){ impXLSX(data=>{ data.forEach(r=>{ if(r.員工){ const eid=employees.find(e=>(e.code+' '+e.name)===r.員工||e.name===r.員工); if(eid){ leaves.push({id:genId(),employeeId:eid.id,startDate:r.起日||'',endDate:r.迄日||'',type:r.類型||'事假',hours:Number(r.時數)||8,status:r.狀態||'待審',reason:r.原因||''}); } } }); save('leaves',leaves); renderPage(); }); }
function importOvertime(){ impXLSX(data=>{ data.forEach(r=>{ if(r.日期&&r.員工){ const eid=employees.find(e=>(e.code+' '+e.name)===r.員工||e.name===r.員工); if(eid){ overtimes.push({id:genId(),date:r.日期,employeeId:eid.id,type:r.類型||'平日加班',hours:Number(r.時數)||2,note:r.備註||''}); } } }); save('overtimes',overtimes); renderPage(); }); }
