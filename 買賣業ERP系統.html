<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>買賣業 ERP 系統 — 財會單位</title>
<style>
/* ═══════════════════════════════════════════════
   DESIGN: Industrial Utilitarian — Bloomberg-inspired
   Palette: Deep Space + Signal Amber accents
   ═══════════════════════════════════════════════ */
:root {
  --bg-app: #0a0e14;
  --bg-sidebar: #0d1117;
  --bg-main: #f5f3ef;
  --bg-card: #ffffff;
  --bg-input: #f8f7f4;
  --bg-row-alt: #faf9f7;
  --bg-modal: #ffffff;
  --text-primary: #1a1a18;
  --text-secondary: #6b6a65;
  --text-muted: #9a9995;
  --text-sidebar: #8b949e;
  --text-sidebar-active: #e6edf3;
  --accent: #d4820a;
  --accent-light: #f5a623;
  --positive: #1b7d46;
  --negative: #c0392b;
  --border: #e0ded8;
  --border-light: #eeede9;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 6px;
  --radius-sm: 4px;
  --font-mono: 'SF Mono','Cascadia Code','JetBrains Mono','Consolas',monospace;
  --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;
  --sidebar-w: 240px;
  --header-h: 48px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font-sans); background:var(--bg-app); color:var(--text-primary); display:flex; height:100vh; overflow:hidden; }

/* ── Sidebar ── */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w); background:var(--bg-sidebar);
  display:flex; flex-direction:column; border-right:1px solid #1c2128; z-index:10;
}
.sidebar-brand {
  padding:16px 18px; border-bottom:1px solid #1c2128;
  display:flex; align-items:center; gap:10px;
}
.sidebar-brand .icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; }
.sidebar-brand .title { font-size:14px; font-weight:700; color:var(--text-sidebar-active); letter-spacing:-0.3px; }
.sidebar-brand .sub { font-size:10px; color:var(--text-sidebar); margin-top:1px; }

.sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
.nav-section { margin-bottom:6px; }
.nav-section-title {
  padding:10px 18px 4px; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.2px; color:var(--accent); opacity:0.7;
}
.nav-item {
  display:flex; align-items:center; gap:8px; padding:8px 18px; cursor:pointer;
  font-size:13px; color:var(--text-sidebar); transition:all 0.15s; border-left:2px solid transparent;
  user-select:none;
}
.nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text-sidebar-active); }
.nav-item.active { background:rgba(212,130,10,0.08); color:var(--accent-light); border-left-color:var(--accent); font-weight:600; }
.nav-item .nav-icon { font-size:14px; width:18px; text-align:center; }

.sidebar-footer { padding:12px 18px; border-top:1px solid #1c2128; font-size:11px; color:var(--text-sidebar); display:flex; justify-content:space-between; }

/* ── Main ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header {
  height:var(--header-h); min-height:var(--header-h); background:var(--bg-card);
  border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px;
  justify-content:space-between; box-shadow:var(--shadow);
}
.header h1 { font-size:16px; font-weight:700; color:var(--text-primary); letter-spacing:-0.3px; }
.header-actions { display:flex; gap:8px; align-items:center; }
.header-date { font-size:12px; color:var(--text-muted); font-family:var(--font-mono); }

.content { flex:1; overflow-y:auto; padding:20px; background:var(--bg-main); }

/* ── Cards ── */
.card { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid var(--border-light); }
.card-header { padding:14px 18px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; }
.card-header h2 { font-size:14px; font-weight:700; }
.card-body { padding:18px; }

/* ── Toolbar ── */
.toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
.toolbar .spacer { flex:1; }

/* ── Buttons ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.15s; font-family:inherit; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#b87008; }
.btn-outline { background:#fff; color:var(--text-primary); border:1px solid var(--border); }
.btn-outline:hover { background:var(--bg-input); border-color:#ccc; }
.btn-danger { background:#fff; color:var(--negative); border:1px solid #f0d0d0; }
.btn-danger:hover { background:#fef2f2; }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-xs { padding:2px 8px; font-size:11px; }

/* ── Table ── */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th {
  background:var(--bg-input); padding:10px 12px; text-align:left; font-weight:700;
  font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-secondary);
  border-bottom:2px solid var(--border); white-space:nowrap;
}
.data-table td { padding:9px 12px; border-bottom:1px solid var(--border-light); }
.data-table tbody tr:hover { background:rgba(212,130,10,0.04); }
.data-table .num { text-align:right; font-family:var(--font-mono); font-size:12px; }
.data-table .center { text-align:center; }
.data-table .debit { color:var(--text-primary); }
.data-table .credit { color:var(--negative); }

/* ── Forms ── */
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:var(--text-secondary); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius-sm);
  font-size:13px; font-family:inherit; background:var(--bg-input); transition:border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(212,130,10,0.1); }
.form-row { display:flex; gap:12px; }
.form-row > * { flex:1; }

/* ── Modal ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--bg-modal); border-radius:var(--radius); box-shadow:var(--shadow-lg); width:640px; max-width:90vw; max-height:85vh; overflow-y:auto; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-size:15px; font-weight:700; }
.modal-body { padding:20px; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--border-light); display:flex; gap:8px; justify-content:flex-end; }
.close-btn { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); padding:4px; line-height:1; }

/* ── KPI Cards ── */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
.kpi-card { background:var(--bg-card); border-radius:var(--radius); padding:16px; border:1px solid var(--border-light); box-shadow:var(--shadow); }
.kpi-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; }
.kpi-value { font-size:26px; font-weight:800; font-family:var(--font-mono); letter-spacing:-1px; }
.kpi-value.positive { color:var(--positive); }
.kpi-value.negative { color:var(--negative); }
.kpi-value.neutral { color:var(--text-primary); }

/* ── Badge / Status ── */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-success { background:#e6f4ea; color:var(--positive); }
.badge-warning { background:#fef3e0; color:var(--accent); }
.badge-danger { background:#fce8e6; color:var(--negative); }

/* ── Search ── */
.search-input { padding:7px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; width:200px; background:var(--bg-input); }
.search-input:focus { outline:none; border-color:var(--accent); }

/* ── Journal Entry Lines ── */
.entry-line { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.entry-line select { flex:2; }
.entry-line input { flex:1; }

/* ── Empty State ── */
.empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
.empty-state .empty-icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:13px; }

/* ── Tabs ── */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
.tab { padding:10px 18px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; user-select:none; }
.tab:hover { color:var(--text-primary); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── Report totals ── */
.report-section { margin-bottom:20px; }
.report-section h3 { font-size:14px; font-weight:700; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--border-light); }
.total-row td { font-weight:700; border-top:2px solid var(--border); background:var(--bg-input); }
.indent { padding-left:24px; color:var(--text-secondary); }

.hidden { display:none !important; }

/* ── Version Badge ── */
.sidebar-version {
  text-align:center; padding:8px 18px 4px; font-size:11px; font-weight:700;
  color:#d4820a; letter-spacing:0.5px; border-top:1px solid #1c2128;
}
.sidebar-version span {
  display:inline-block; padding:3px 10px; border-radius:10px;
  background:rgba(212,130,10,0.12); border:1px solid rgba(212,130,10,0.25);
}

/* ── Login Modal ── */
.login-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200;
  display:flex; align-items:center; justify-content:center;
}
.login-box {
  background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow-lg);
  width:380px; max-width:90vw; padding:0;
}
.login-box-header {
  padding:20px 24px 0; text-align:center;
}
.login-box-header .login-icon { font-size:36px; margin-bottom:8px; }
.login-box-header h2 { font-size:18px; font-weight:700; color:var(--text-primary); }
.login-box-header p { font-size:12px; color:var(--text-muted); margin-top:4px; }
.login-box-body { padding:20px 24px; }
.login-box-body .form-group { margin-bottom:14px; }
.login-box-body .form-group label { font-size:12px; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px; }
.login-box-body .form-group input {
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
  font-size:14px; font-family:inherit; background:var(--bg-input);
}
.login-box-body .form-group input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(212,130,10,0.1); }
.login-error { color:var(--negative); font-size:12px; margin-bottom:8px; min-height:18px; }
.login-box-footer { padding:12px 24px 20px; }
.login-box-footer .btn { width:100%; padding:10px; font-size:14px; justify-content:center; }

/* ── User Management ── */
.user-menu { position:relative; display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
.user-menu .user-avatar {
  width:28px; height:28px; border-radius:50%; background:var(--accent);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700;
}
.user-menu .user-name { font-size:12px; color:var(--text-primary); }
.user-dropdown {
  position:absolute; top:100%; right:0; margin-top:4px; background:var(--bg-card);
  border:1px solid var(--border-light); border-radius:var(--radius); box-shadow:var(--shadow-lg);
  min-width:160px; z-index:50; display:none;
}
.user-dropdown.show { display:block; }
.user-dropdown-item {
  padding:9px 16px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px;
}
.user-dropdown-item:hover { background:var(--bg-input); }
.user-dropdown-item.danger { color:var(--negative); }

/* ── User Table in Modal ── */
.user-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
.user-table th { background:var(--bg-input); padding:8px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-secondary); border-bottom:2px solid var(--border); }
.user-table td { padding:8px 12px; border-bottom:1px solid var(--border-light); }

</style>

<script>
/* ═══════════════════════════════════════════════════════
   ERP SYSTEM — 買賣業進銷存 + 財務會計（專業版 V2.0）
   Data persisted in IndexedDB
   ═══════════════════════════════════════════════════════ */

// ── State ──
const STATE = {
  currentPage: 'chart-of-accounts',
  editingId: null,
};

// ═══ IndexedDB Layer ═══
const DB_NAME = 'ERP_DB';
const DB_VERSION = 3;
const STORES = ['accounts','journalEntries','products','suppliers','customers','purchaseOrders','salesOrders','users','license','openingBalances','openingDate'];

let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      for (const s of STORES) {
        if (!db.objectStoreNames.contains(s)) {
          db.createObjectStore(s, { keyPath: 'id' });
        }
      }
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbLoad(storeName, fallback) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(storeName, 'readonly');
      const store = tx.objectStore(storeName);
      const req = store.getAll();
      req.onsuccess = () => {
        const data = req.result;
        resolve(data && data.length > 0 ? data : fallback);
      };
      req.onerror = () => resolve(fallback);
    });
  } catch(e) { return fallback; }
}

async function dbSave(storeName, data) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      const store = tx.objectStore(storeName);
      store.clear();
      for (const item of data) {
        store.put(item);
      }
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  } catch(e) { /* silent */ }
}

async function migrateFromLocalStorage() {
  const keys = ['accounts','journalEntries','products','suppliers','customers','purchaseOrders','salesOrders','users'];
  let migrated = false;
  for (const k of keys) {
    try {
      const raw = localStorage.getItem('erp_' + k);
      if (raw) {
        const data = JSON.parse(raw);
        if (Array.isArray(data) && data.length > 0) {
          await dbSave(k, data);
          localStorage.removeItem('erp_' + k);
          migrated = true;
        }
      }
    } catch(e) { /* skip */ }
  }
  return migrated;
}

// ── Compat load/save API (async) ──
async function load(key, fallback) {
  return await dbLoad(key, fallback);
}
async function save(key, data) {
  await dbSave(key, data);
}

// ── Default Chart of Accounts ──
const DEFAULT_ACCOUNTS = [
  // === 1xxx 資產 ===
  {id:'a01',code:'1101',name:'現金',type:'asset'},
  {id:'a02',code:'1102',name:'銀行存款-甲存',type:'asset'},
  {id:'a03',code:'1103',name:'銀行存款-乙存',type:'asset'},
  {id:'a04',code:'1111',name:'應收票據',type:'asset'},
  {id:'a05',code:'1112',name:'應收帳款',type:'asset'},
  {id:'a06',code:'1113',name:'備抵呆帳',type:'asset'},
  {id:'a07',code:'1121',name:'存貨',type:'asset'},
  {id:'a08',code:'1122',name:'物料',type:'asset'},
  {id:'a09',code:'1131',name:'預付貨款',type:'asset'},
  {id:'a10',code:'1132',name:'預付費用',type:'asset'},
  {id:'a11',code:'1141',name:'暫付款',type:'asset'},
  {id:'a12',code:'1151',name:'進項稅額',type:'asset'},
  {id:'a13',code:'1201',name:'短期投資',type:'asset'},
  {id:'a14',code:'1401',name:'土地',type:'asset'},
  {id:'a15',code:'1402',name:'建築物',type:'asset'},

const LICENSE_SECRET = "TaiwanSME-ERP-HR-2026-AutoClaw";
const PRODUCT_CODE = 1; // 1=ERP, 2=HR

async function verifyLicenseAsync(key, company) {
  if (!key || !company) return { valid: false, reason: '請輸入金鑰與公司名稱' };
  const parts = key.trim().split('-');
  if (parts.length !== 4) return { valid: false, reason: '金鑰格式錯誤（需為 XXXX-XXXX-XXXX-XXXX）' };
  const h = (parts[0] + parts[1] + parts[2]).toUpperCase();
  const expiry = parts[3];
  const tierNames = { 1: '免費版', 2: '專業版', 3: '企業版' };
  for (let tier = 1; tier <= 3; tier++) {
    const body = new TextEncoder().encode(`${PRODUCT_CODE}|${tier}|${company}|${expiry}|${LICENSE_SECRET}`);
    const hashBuffer = await crypto.subtle.digest('SHA-256', body);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
    if (hashHex.startsWith(h)) {
      // Check expiry
      if (expiry !== '999999') {
        const y = parseInt('20' + expiry.slice(0, 2));
        const m = parseInt(expiry.slice(2, 4)) - 1;
        const d = parseInt(expiry.slice(4, 6));
        const expDate = new Date(y, m, d);
        if (new Date() > expDate) return { valid: false, reason: '授權已過期（' + expDate.toLocaleDateString('zh-TW') + '）' };
      }
      return { valid: true, tier, tierName: tierNames[tier], company, key, expiry: expiry === '999999' ? '永久' : expiry };
    }
  }
  return { valid: false, reason: '金鑰無效，請確認金鑰與公司名稱正確' };
}

function checkLogin() {
  const sess = sessionStorage.getItem('erp_session');
  if (sess) {
    try {
      const u = JSON.parse(sess);
      const found = users.find(x => x.id === u.id);
      if (found) { currentUser = found; return true; }
    } catch(e) { sessionStorage.removeItem('erp_session'); }
  }
  return false;
}

  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  if (!username || !password) { errEl.textContent = '請輸入帳號與密碼'; return; }

    default: content.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>請選擇功能模組</p></div>';
  }
  // Free tier warning for salary page
  if (STATE.license && STATE.license.tier === 1 && page === 'salary') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#fef9e7;color:#7d6608;padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:14px;font-size:13px;border:1px solid #f9e79f;';
    banner.textContent = '⚠️ 免費版僅供評估使用，完整功能請升級專業版';
    content.insertBefore(banner, content.firstChild);
  }
  bindPageEvents();
}

//  1. CHART OF ACCOUNTS
// ═══════════════════════════════════════════════
function renderChartOfAccounts() {
  const types = ['asset','liability','equity','revenue','expense'];
  let html = `<div class="card"><div class="card-header"><h2>會計科目一覽</h2>

      <button class="btn btn-primary" onclick="showAccountModal()">＋ 新增科目</button>
    </div></div><div class="card-body">`;

  for (const t of types) {
    const items = accounts.filter(a => a.type === t);
    if (items.length === 0) continue;
    html += `<div class="report-section"><h3>${accTypeLabel(t)}</h3>
      <table class="data-table"><thead><tr><th>代碼</th><th>科目名稱</th><th>類別</th><th></th></tr></thead><tbody>`;
    for (const a of items) {
      html += `<tr><td style="font-family:var(--font-mono);font-size:12px;">${a.code}</td>

        </td></tr>`;

}

function showAccountModal(id) {
  const acc = id ? accounts.find(a => a.id === id) : null;
  STATE.editingId = id || null;
  const html = `<div class="modal-header"><h3>${acc?'編輯':'新增'}會計科目</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label>科目代碼</label><input id="accCode" value="${acc?acc.code:''}"></div>
      <div class="form-group"><label>科目名稱</label><input id="accName" value="${acc?acc.name:''}"></div></div>
      <div class="form-group"><label>類別</label><select id="accType">${['asset','liability','equity','revenue','expense'].map(t=>`<option value="${t}" ${acc&&acc.type===t?'selected':''}>${accTypeLabel(t)}</option>`).join('')}</select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveAccount()">儲存</button>
    </div>`;
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function saveAccount() {
  const code = document.getElementById('accCode').value.trim();
  const name = document.getElementById('accName').value.trim();
  const type = document.getElementById('accType').value;
  if (!code || !name) return alert('請填寫代碼與名稱');
  if (STATE.editingId) {
    const idx = accounts.findIndex(a => a.id === STATE.editingId);
    if (idx >= 0) { accounts[idx].code = code; accounts[idx].name = name; accounts[idx].type = type; }
  } else {
    accounts.push({id:genId(), code, name, type, parent:''});
  }
  save('accounts', accounts);
  closeModal();
  renderPage();
}

function deleteAccount(id) {
  if (!confirm('確定刪除此科目？')) return;
  accounts = accounts.filter(a => a.id !== id);
  save('accounts', accounts);
  renderPage();
}

//  2. JOURNAL ENTRIES
// ═══════════════════════════════════════════════
function renderJournal() {
  const today = new Date().toISOString().split('T')[0];
  let html = `<div class="card"><div class="card-header"><h2>傳票列表</h2>
    <button class="btn btn-primary" onclick="showJournalModal()">＋ 新增傳票</button></div><div class="card-body">`;
  if (journalEntries.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">📝</div><p>尚無傳票記錄</p></div>`;
  } else {
    html += `<table class="data-table"><thead><tr><th>日期</th><th>傳票編號</th><th>摘要</th><th>借方合計</th><th>貸方合計</th><th></th></tr></thead><tbody>`;
    for (const je of [...journalEntries].reverse()) {
      const totalDr = je.lines.reduce((s,l) => s + l.debit, 0);
      const totalCr = je.lines.reduce((s,l) => s + l.credit, 0);
      html += `<tr><td>${fmtDate(je.date)}</td><td style="font-family:var(--font-mono);font-size:12px;">${je.voucher}</td>
        <td>${je.desc}</td><td class="num">${fmtMoney(totalDr)}</td><td class="num credit">${fmtMoney(totalCr)}</td>
        <td style="text-align:right;">
          <button class="btn btn-outline btn-xs" onclick="viewJournalDetail('${je.id}')">明細</button>
          ${canDelete() ? `<button class="btn btn-danger btn-xs" style="margin-left:4px;" onclick="deleteJournal('${je.id}')">刪除</button>` : ''}
        </td></tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `</div></div>`;
  return html;
}

function showJournalModal(id) {
  const je = id ? journalEntries.find(j => j.id === id) : null;
  STATE.editingId = id || null;
  const lines = je ? je.lines : [{acc:'',debit:0,credit:0},{acc:'',debit:0,credit:0}];
  const accOptions = accounts.map(a => `<option value="${a.id}">${a.code} ${a.name}</option>`).join('');

  let html = `<div class="modal-header"><h3>${je?'檢視':'新增'}傳票</h3><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label>日期</label><input type="date" id="jeDate" value="${je?je.date:new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label>傳票編號</label><input id="jeVoucher" value="${je?je.voucher:''}" placeholder="自動或手動輸入"></div></div>
      <div class="form-group"><label>摘要</label><input id="jeDesc" value="${je?je.desc:''}"></div>
      <div style="margin-bottom:10px;"><strong style="font-size:13px;">分錄明細</strong>
        <button class="btn btn-outline btn-sm" style="margin-left:8px;" onclick="addJournalLine()">＋ 新增行</button></div>
      <div id="jeLines">`;

  lines.forEach((l, i) => {
    html += `<div class="entry-line">
      <select class="je-acc">${accOptions.replace(`value="${l.acc}"`,`value="${l.acc}" selected`)}</select>
      <input type="number" class="je-debit" placeholder="借方金額" value="${l.debit||''}" step="1" min="0">
      <input type="number" class="je-credit" placeholder="貸方金額" value="${l.credit||''}" step="1" min="0">
      ${i >= 2 ? `<button class="btn btn-danger btn-xs" onclick="this.closest('.entry-line').remove()">✕</button>` : ''}
    </div>`;
  });

  html += `</div>
    <div style="margin-top:8px;font-size:12px;font-family:var(--font-mono);">
      借方合計：<span id="jeDrTotal" style="font-weight:700;">0</span>　｜　貸方合計：<span id="jeCrTotal" style="font-weight:700;color:var(--negative);">0</span>
      <span id="jeBalance" style="margin-left:12px;"></span>
    </div></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveJournal()">儲存傳票</button>
    </div>`;
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');

  // Bind je line change events
  document.getElementById('jeLines').addEventListener('input', updateJeTotals);
  updateJeTotals();
}

function addJournalLine() {
  const accOptions = accounts.map(a => `<option value="${a.id}">${a.code} ${a.name}</option>`).join('');
  const div = document.createElement('div');
  div.className = 'entry-line';
  div.innerHTML = `<select class="je-acc">${accOptions}</select>
    <input type="number" class="je-debit" placeholder="借方金額" step="1" min="0">
    <input type="number" class="je-credit" placeholder="貸方金額" step="1" min="0">
    <button class="btn btn-danger btn-xs" onclick="this.closest('.entry-line').remove();updateJeTotals()">✕</button>`;
  document.getElementById('jeLines').appendChild(div);
  div.addEventListener('input', updateJeTotals);
  updateJeTotals();
}

function updateJeTotals() {
  let dr = 0, cr = 0;
  document.querySelectorAll('#jeLines .entry-line').forEach(el => {
    dr += Number(el.querySelector('.je-debit').value) || 0;
    cr += Number(el.querySelector('.je-credit').value) || 0;
  });
  const drEl = document.getElementById('jeDrTotal');
  const crEl = document.getElementById('jeCrTotal');
  const balEl = document.getElementById('jeBalance');
  if (drEl) drEl.textContent = fmtMoney(dr);
  if (crEl) crEl.textContent = fmtMoney(cr);
  if (balEl) {
    const diff = dr - cr;
    if (diff === 0) balEl.innerHTML = '<span style="color:var(--positive);font-weight:700;">✓ 借貸平衡</span>';
    else balEl.innerHTML = `<span style="color:var(--negative);font-weight:700;">⚠ 差額 ${fmtMoney(Math.abs(diff))}</span>`;
  }
}

function saveJournal() {
  const date = document.getElementById('jeDate').value;
  let voucher = document.getElementById('jeVoucher').value.trim();
  const desc = document.getElementById('jeDesc').value.trim();
  if (!date || !desc) return alert('請填寫日期與摘要');

  const lines = [];
  document.querySelectorAll('#jeLines .entry-line').forEach(el => {
    const acc = el.querySelector('.je-acc').value;
    const debit = Number(el.querySelector('.je-debit').value) || 0;
    const credit = Number(el.querySelector('.je-credit').value) || 0;
    if (acc && (debit > 0 || credit > 0)) lines.push({acc, debit, credit});
  });
  if (lines.length < 2) return alert('至少需兩行分錄');
  const dr = lines.reduce((s,l) => s + l.debit, 0);
  const cr = lines.reduce((s,l) => s + l.credit, 0);
  if (dr !== cr) return alert('借貸不平衡！');

  if (!voucher) {
    const d = new Date(date);
    voucher = `${d.getFullYear()-1911}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}-${String(journalEntries.length+1).padStart(3,'0')}`;
    document.getElementById('jeVoucher').value = voucher;
  }

  if (STATE.editingId) {
    const idx = journalEntries.findIndex(j => j.id === STATE.editingId);
    if (idx >= 0) { journalEntries[idx] = {...journalEntries[idx], date, voucher, desc, lines}; }
  } else {
    journalEntries.push({id:genId(), date, voucher, desc, lines});
  }
  save('journalEntries', journalEntries);
  closeModal();
  renderPage();
}

function viewJournalDetail(id) { showJournalModal(id); }
function deleteJournal(id) {
  if (!confirm('確定刪除此傳票？')) return;
  journalEntries = journalEntries.filter(j => j.id !== id);
  save('journalEntries', journalEntries);
  renderPage();
}

// ═══════════════════════════════════════════════
//  3. GENERAL LEDGER
// ═══════════════════════════════════════════════
function renderGeneralLedger() {
  let html = `<div class="card"><div class="card-header"><h2>總分類帳</h2>
    <div style="display:flex;gap:8px;">
      <select id="glAccount" style="padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;">${accounts.map(a=>`<option value="${a.id}">${a.code} ${a.name}</option>`).join('')}</select>
      <button class="btn btn-primary btn-sm" onclick="renderPage()">查詢</button>
    </div></div><div class="card-body">`;

  const accId = document.getElementById('glAccount')?.value || accounts[0]?.id;
  if (!accId) { html += `<div class="empty-state"><p>無會計科目</p></div>`; }
  else {
    const acc = accounts.find(a => a.id === accId);
    html += `<h3 style="margin-bottom:12px;">${acc.code} ${acc.name}（${accTypeLabel(acc.type)}）</h3>`;

    // Collect all lines for this account
    const entries = [];
    for (const je of journalEntries) {
      for (const l of je.lines) {
        if (l.acc === accId && (l.debit > 0 || l.credit > 0)) {
          entries.push({date:je.date, voucher:je.voucher, desc:je.desc, debit:l.debit, credit:l.credit});
        }
      }
    }
    entries.sort((a,b) => a.date.localeCompare(b.date));

    if (entries.length === 0) {
      html += `<div class="empty-state"><p>尚無此科目交易記錄</p></div>`;
    } else {
      let balance = 0;
      html += `<table class="data-table"><thead><tr><th>日期</th><th>傳票</th><th>摘要</th><th class="num">借方</th><th class="num">貸方</th><th class="num">餘額</th></tr></thead><tbody>`;
      for (const e of entries) {
        balance += e.debit - e.credit;
        html += `<tr><td>${fmtDate(e.date)}</td><td style="font-family:var(--font-mono);font-size:12px;">${e.voucher}</td>
          <td>${e.desc}</td><td class="num">${e.debit>0?fmtMoney(e.debit):''}</td><td class="num credit">${e.credit>0?fmtMoney(e.credit):''}</td>
          <td class="num" style="font-weight:600;">${fmtMoney(balance)}</td></tr>`;
      }
      html += `</tbody></table>`;
    }
  }
  html += `</div></div>`;
  return html;
}

// ═══════════════════════════════════════════════
//  4. TRIAL BALANCE
// ═══════════════════════════════════════════════
function renderTrialBalance() {
  // Compute balance per account
  const balances = {};
  for (const a of accounts) balances[a.id] = 0;
  for (const je of journalEntries) {
    for (const l of je.lines) {
      balances[l.acc] = (balances[l.acc] || 0) + l.debit - l.credit;
    }
  }

  let html = `<div class="card"><div class="card-header"><h2>試算表</h2><span style="font-size:12px;color:var(--text-muted);">餘額式試算表</span></div><div class="card-body">
    <table class="data-table"><thead><tr><th>代碼</th><th>科目名稱</th><th>類別</th><th class="num">借方餘額</th><th class="num">貸方餘額</th></tr></thead><tbody>`;

  let totalDr = 0, totalCr = 0;
  for (const a of accounts) {
    const bal = balances[a.id] || 0;
    // Show all accounts including zero
    const dr = bal > 0 ? bal : 0;
    const cr = bal < 0 ? -bal : 0;
    totalDr += dr; totalCr += cr;
    html += `<tr><td style="font-family:var(--font-mono);font-size:12px;">${a.code}</td>
      <td>${a.name}</td><td><span class="badge badge-success">${accTypeLabel(a.type)}</span></td>
      <td class="num">${dr>0?fmtMoney(dr):''}</td><td class="num credit">${cr>0?fmtMoney(cr):''}</td></tr>`;
  }
  html += `<tr class="total-row"><td colspan="3"><strong>合計</strong></td>
    <td class="num"><strong>${fmtMoney(totalDr)}</strong></td><td class="num credit"><strong>${fmtMoney(totalCr)}</strong></td></tr>`;
  html += `</tbody></table>
    <div style="margin-top:12px;font-size:12px;color:${totalDr===totalCr?'var(--positive)':'var(--negative)'};font-family:var(--font-mono);">
    ${totalDr===totalCr?'✓ 借貸平衡':'⚠ 借貸不平衡！差額 '+fmtMoney(Math.abs(totalDr-totalCr))}
    </div></div></div>`;
  return html;
}

// ═══════════════════════════════════════════════
//  5. INCOME STATEMENT
// ═══════════════════════════════════════════════
function renderIncomeStatement() {
  const now = new Date();
  const mode = document.getElementById('isMode')?.value || 'year';
  const company = (STATE.license && STATE.license.company) || '';
  let html = `<div class="card"><div class="card-header"><h2>${company?company+' — ':''}損益表</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="isMode" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;" onchange="renderPage()">
        <option value="year"${mode==='year'?' selected':''}>年度比較</option>
        <option value="period"${mode==='period'?' selected':''}>期間損益</option>
      </select>`;

  if (mode === 'period') {
    const from = document.getElementById('isFrom')?.value || '';
    const to = document.getElementById('isTo')?.value || '';
    const balances = from || to ? getBalancesForPeriod(from, to) : getBalances();
    const revenue = sumByType('revenue', balances);
    const expenses = sumByType('expense', balances);
    const netIncome = revenue - expenses;

    html += `<input type="date" id="isFrom" value="${from}" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;" onchange="renderPage()">
      <span style="font-size:12px;color:var(--text-muted);">～</span>
      <input type="date" id="isTo" value="${to}" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;" onchange="renderPage()">
      ${from||to?`<button class="btn btn-outline btn-xs" onclick="renderPage()">查詢</button>`:''}
      <span style="font-size:12px;color:var(--text-muted);">${from||to?(from||'起始')+'～'+(to||'今日'):'全部期間'}</span>
    </div></div><div class="card-body">`;

    html += `<div class="report-section"><h3>營業收入</h3><table class="data-table"><tbody>`;
    for (const a of accounts.filter(x=>x.type==='revenue')) {
      const bal = balances[a.id] || 0;
      html += `<tr><td>${a.name}</td><td class="num">${fmtMoney(Math.abs(bal))}</td></tr>`;
    }
    html += `<tr class="total-row"><td>營業收入合計</td><td class="num">${fmtMoney(revenue)}</td></tr></tbody></table></div>`;

    html += `<div class="report-section"><h3>營業成本與費用</h3><table class="data-table"><tbody>`;
    for (const a of accounts.filter(x=>x.type==='expense')) {
      const bal = balances[a.id] || 0;
      // Show all accounts including zero
      html += `<tr><td>${a.name}</td><td class="num credit">${fmtMoney(Math.abs(bal))}</td></tr>`;
    }
    html += `<tr class="total-row"><td>費用合計</td><td class="num credit">${fmtMoney(expenses)}</td></tr></tbody></table></div>`;

    html += `<div class="report-section"><h3>本期損益</h3>
      <div class="kpi-card" style="margin-top:8px;"><div class="kpi-label">本期淨利（損）</div>
      <div class="kpi-value ${netIncome>=0?'positive':'negative'}">${fmtMoney(netIncome)}</div></div></div>`;
  } else {
    const year = Number(document.getElementById('isYear')?.value) || now.getFullYear();
    html += `<select id="isYear" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;" onchange="renderPage()">`;
    for (let y = now.getFullYear(); y >= now.getFullYear() - 10; y--) {
      html += `<option value="${y}"${year===y?' selected':''}>${y} 年</option>`;
    }
    html += `</select></div></div><div class="card-body" style="overflow-x:auto;">`;

    // Build monthly balances
    const months = [];
    for (let m = 1; m <= 12; m++) {
      const from = `${year}-${String(m).padStart(2,'0')}-01`;
      const to = `${year}-${String(m).padStart(2,'0')}-${new Date(year,m,0).getDate()}`;
      months.push({ m, from, to, balances: getBalancesForPeriod(from, to) });
    }
    const yearBalances = getBalancesForPeriod(`${year}-01-01`, `${year}-12-31`);
    const revAccounts = accounts.filter(a => a.type === 'revenue');
    const expAccounts = accounts.filter(a => a.type === 'expense');

    html += `<table class="data-table" style="font-size:11px;min-width:900px;"><thead><tr><th>科目</th>`;
    for (let m = 1; m <= 12; m++) html += `<th class="num">${m}月</th>`;
    html += `<th class="num">年度合計</th></tr></thead><tbody>`;

    // Revenue rows
    html += `<tr style="background:var(--bg-input);"><td colspan="14" style="font-weight:700;font-size:12px;">營業收入</td></tr>`;
    for (const a of revAccounts) {
      html += `<tr><td>${a.name}</td>`;
      for (const mo of months) {
        const bal = Math.abs(mo.balances[a.id] || 0);
        html += `<td class="num">${bal ? fmtMoney(bal) : ''}</td>`;
      }
      html += `<td class="num" style="font-weight:600;">${fmtMoney(Math.abs(yearBalances[a.id] || 0))}</td></tr>`;
    }
    html += `<tr class="total-row"><td>收入合計</td>`;
    for (const mo of months) {
      html += `<td class="num">${fmtMoney(sumByType('revenue', mo.balances))}</td>`;
    }
    html += `<td class="num">${fmtMoney(sumByType('revenue', yearBalances))}</td></tr>`;

    // Expense rows
    html += `<tr style="background:var(--bg-input);"><td colspan="14" style="font-weight:700;font-size:12px;">營業成本與費用</td></tr>`;
    for (const a of expAccounts) {
      const yb = Math.abs(yearBalances[a.id] || 0);
      // Show all accounts including zero
      html += `<tr><td>${a.name}</td>`;
      for (const mo of months) {
        const bal = Math.abs(mo.balances[a.id] || 0);
        html += `<td class="num credit">${bal ? fmtMoney(bal) : ''}</td>`;
      }
      html += `<td class="num credit" style="font-weight:600;">${fmtMoney(yb)}</td></tr>`;
    }
    html += `<tr class="total-row"><td>費用合計</td>`;
    for (const mo of months) {
      html += `<td class="num credit">${fmtMoney(sumByType('expense', mo.balances))}</td>`;
    }
    html += `<td class="num credit">${fmtMoney(sumByType('expense', yearBalances))}</td></tr>`;

    // Net income row
    html += `<tr style="background:#fef9e7;font-weight:700;"><td>本期淨利（損）</td>`;
    for (const mo of months) {
      const net = sumByType('revenue', mo.balances) - sumByType('expense', mo.balances);
      html += `<td class="num" style="color:${net>=0?'var(--positive)':'var(--negative)'};">${fmtMoney(net)}</td>`;
    }
    const netYear = sumByType('revenue', yearBalances) - sumByType('expense', yearBalances);
    html += `<td class="num" style="color:${netYear>=0?'var(--positive)':'var(--negative)'};">${fmtMoney(netYear)}</td></tr>`;

    html += `</tbody></table>`;
  }

  html += `</div></div>`;
  return html;
}

function renderBalanceSheet() {
  const asOf = document.getElementById('bsDate')?.value || new Date().toISOString().split('T')[0];
  const balances = getBalancesAsOf(asOf);
  const company = (STATE.license && STATE.license.company) || '';
  let html = `<div class="card"><div class="card-header"><h2>${company?company+' — ':''}資產負債表</h2><span style="font-size:12px;color:var(--text-muted);"><input type="date" id="bsDate" value="${asOf}" style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;" onchange="renderPage()"></span></div><div class="card-body">`;

  // Assets
  html += `<div class="report-section"><h3>資產</h3><table class="data-table"><tbody>`;
  let totalAssets = 0;
  for (const a of accounts.filter(x=>x.type==='asset')) {
    const bal = balances[a.id] || 0;
    // Show all accounts including zero
    totalAssets += bal;
    html += `<tr><td>${a.name}</td><td class="num">${fmtMoney(bal)}</td></tr>`;
  }
  html += `<tr class="total-row"><td>資產合計</td><td class="num">${fmtMoney(totalAssets)}</td></tr></tbody></table></div>`;

  // Liabilities
  html += `<div class="report-section"><h3>負債</h3><table class="data-table"><tbody>`;
  let totalLiabilities = 0;
  for (const a of accounts.filter(x=>x.type==='liability')) {
    const bal = -(balances[a.id] || 0);
    // Show all accounts including zero
    totalLiabilities += bal;
    html += `<tr><td>${a.name}</td><td class="num credit">${fmtMoney(bal)}</td></tr>`;
  }
  html += `<tr class="total-row"><td>負債合計</td><td class="num credit">${fmtMoney(totalLiabilities)}</td></tr></tbody></table></div>`;

  // Equity
  html += `<div class="report-section"><h3>權益</h3><table class="data-table"><tbody>`;
  let totalEquity = 0;
  for (const a of accounts.filter(x=>x.type==='equity')) {
    const bal = -(balances[a.id] || 0);
    // Show all accounts including zero
    totalEquity += bal;
    html += `<tr><td>${a.name}</td><td class="num">${fmtMoney(bal)}</td></tr>`;
  }
  html += `<tr class="total-row"><td>權益合計</td><td class="num">${fmtMoney(totalEquity)}</td></tr></tbody></table></div>`;

  html += `<div style="margin-top:12px;font-size:12px;font-family:var(--font-mono);color:${Math.abs(totalAssets-(totalLiabilities+totalEquity))<1?'var(--positive)':'var(--negative)'};">
    資產 = 負債 + 權益：${fmtMoney(totalAssets)} = ${fmtMoney(totalLiabilities)} + ${fmtMoney(totalEquity)}
    ${Math.abs(totalAssets-(totalLiabilities+totalEquity))<1?' ✓':' ⚠'}
    </div></div></div>`;
  return html;
}

function getBalances() {
  const balances = {};
  for (const a of accounts) balances[a.id] = 0;
  for (const je of journalEntries) {
    for (const l of je.lines) {
      balances[l.acc] = (balances[l.acc] || 0) + l.debit - l.credit;
    }
  }
  return balances;
}
function getBalancesForPeriod(from, to) {
  const balances = {};
  for (const a of accounts) balances[a.id] = 0;
  for (const je of journalEntries) {
    if (from && je.date < from) continue;
    if (to && je.date > to) continue;
    for (const l of je.lines) {
      balances[l.acc] = (balances[l.acc] || 0) + l.debit - l.credit;
    }
  }
  return balances;
}
function sumByType(type, balances) {
  let sum = 0;
  for (const a of accounts.filter(x => x.type === type)) {
    const bal = balances[a.id] || 0;
    if (type === 'revenue' || type === 'equity' || type === 'liability') sum += -bal;
    else sum += bal;
  }
  return Math.abs(sum);
}

// ── Opening Balances (期初餘額) ──
let openingBalances = [];
let openingDate = '';
async function loadOpeningBalances(){ const d=await load('openingBalances',[]); if(d&&d.length>0) openingBalances=d; const od=await load('openingDate',[]); if(od&&od.length>0) openingDate=od[0].date||''; }
function getBalancesAsOf(asOfDate){
  const balances={}; for(const a of accounts) balances[a.id]=0;
  if(openingDate&&openingBalances.length>0&&(!asOfDate||asOfDate>=openingDate)){ for(const ob of openingBalances) balances[ob.acc]=(balances[ob.acc]||0)+ob.debit-ob.credit; }
  const sd=openingDate||'0000-01-01';
  for(const je of journalEntries){ if(je.date<sd)continue; if(asOfDate&&je.date>asOfDate)continue; for(const l of je.lines) balances[l.acc]=(balances[l.acc]||0)+l.debit-l.credit; }
  return balances;
}

  const el = document.getElementById('poTotal');

function savePurchase() {
  const date = document.getElementById('poDate').value;
  const supplierId = document.getElementById('poSupplier').value;
  let poNo = document.getElementById('poNo').value.trim();
  if (!date || !supplierId) return alert('請填寫日期與供應商');

  const lines = [];
  document.querySelectorAll('#poLines .entry-line').forEach(el => {
    const prod = el.querySelector('.po-prod').value;
    const qty = Number(el.querySelector('.po-qty').value) || 0;
    const price = Number(el.querySelector('.po-price').value) || 0;
    if (prod && qty > 0) lines.push({prod, qty, price});
  });
  if (lines.length === 0) return alert('至少需一個進貨品項');

  if (!poNo) {
    const d = new Date(date);
    poNo = `PO${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}-${String(purchaseOrders.length+1).padStart(3,'0')}`;
  }

  // Update stock
  if (!STATE.editingId) {
    for (const l of lines) {
      const prod = products.find(p => p.id === l.prod);
      if (prod) prod.stock += l.qty;
    }
    save('products', products);
  }

  const data = {id: STATE.editingId || genId(), date, poNo, supplierId, status:'已完成', lines};
  if (STATE.editingId) {
    const idx = purchaseOrders.findIndex(x => x.id === STATE.editingId);
    if (idx >= 0) purchaseOrders[idx] = data;
  } else { purchaseOrders.push(data); }
  save('purchaseOrders', purchaseOrders);
  closeModal();
  renderPage();
}

}

    <div class="modal-body">

      <div class="form-group"><label>客戶</label><select id="soCustomer">${custOptions}</select></div>

      <div id="soLines">${linesHtml}</div>
      <div style="margin-top:8px;font-size:12px;font-family:var(--font-mono);">合計金額：<strong id="soTotal">0</strong></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveSales()">儲存並扣減庫存</button></div>`;
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('soLines').addEventListener('input', updateSoTotal);
  updateSoTotal();
}

function addSoLine() {
  const prodOptions = products.map(p => `<option value="${p.id}">${p.code} ${p.name} (成本:${fmtMoney(p.cost)} 庫存:${p.stock})</option>`).join('');
  const div = document.createElement('div');
  div.className = 'entry-line';
  div.innerHTML = `<select class="so-prod">${prodOptions}</select>
    <input type="number" class="so-qty" value="1" placeholder="數量" min="1" style="flex:0.6">
    <input type="number" class="so-price" value="0" placeholder="售價" min="0" style="flex:0.8">
    <button class="btn btn-danger btn-xs" onclick="this.closest('.entry-line').remove();updateSoTotal()">✕</button>`;
  document.getElementById('soLines').appendChild(div);
  div.addEventListener('input', updateSoTotal);
  updateSoTotal();
}

function updateSoTotal() {
  let total = 0;
  document.querySelectorAll('#soLines .entry-line').forEach(el => {
    total += (Number(el.querySelector('.so-qty').value)||0) * (Number(el.querySelector('.so-price').value)||0);
  });
  const el = document.getElementById('soTotal');
  if (el) el.textContent = fmtMoney(total);
}

function saveSales() {
  const date = document.getElementById('soDate').value;
  const customerId = document.getElementById('soCustomer').value;
  let soNo = document.getElementById('soNo').value.trim();
  if (!date || !customerId) return alert('請填寫日期與客戶');

  const lines = [];
  document.querySelectorAll('#soLines .entry-line').forEach(el => {
    const prod = el.querySelector('.so-prod').value;
    const qty = Number(el.querySelector('.so-qty').value) || 0;
    const price = Number(el.querySelector('.so-price').value) || 0;
    if (prod && qty > 0) lines.push({prod, qty, price});
  });
  if (lines.length === 0) return alert('至少需一個銷貨品項');

  // Check stock
  for (const l of lines) {
    const prod = products.find(p => p.id === l.prod);
    if (prod && prod.stock < l.qty && !STATE.editingId) {
      return alert(`${prod.name} 庫存不足！（目前：${prod.stock}，需要：${l.qty}）`);
    }
  }

  if (!soNo) {
    const d = new Date(date);
    soNo = `SO${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}-${String(salesOrders.length+1).padStart(3,'0')}`;
  }

  // Deduct stock
  if (!STATE.editingId) {
    for (const l of lines) {
      const prod = products.find(p => p.id === l.prod);
      if (prod) prod.stock -= l.qty;
    }
    save('products', products);
  }

  const data = {id: STATE.editingId || genId(), date, soNo, customerId, status:'已完成', lines};
  if (STATE.editingId) {
    const idx = salesOrders.findIndex(x => x.id === STATE.editingId);
    if (idx >= 0) salesOrders[idx] = data;
  } else { salesOrders.push(data); }
  save('salesOrders', salesOrders);
  closeModal();
  renderPage();
}

function viewSales(id) { showSalesModal(id); }
function deleteSales(id) {
  if (!confirm('確定刪除此銷貨單？（庫存不會自動補回）')) return;
  salesOrders = salesOrders.filter(x => x.id !== id);
  save('salesOrders', salesOrders);
  renderPage();
}

function renderInventory() {
  const totalValue = products.reduce((s,p) => s + p.stock * p.cost, 0);
  const lowStock = products.filter(p => p.stock > 0 && p.stock <= p.minStock).length;
  const outOfStock = products.filter(p => p.stock <= 0).length;

  let html = `<div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">庫存商品數</div><div class="kpi-value neutral">${products.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">庫存總價值</div><div class="kpi-value neutral">${fmtMoney(totalValue)}</div></div>
    <div class="kpi-card"><div class="kpi-label">低於安全存量</div><div class="kpi-value ${lowStock>0?'negative':'positive'}">${lowStock}</div></div>
    <div class="kpi-card"><div class="kpi-label">缺貨品項</div><div class="kpi-value ${outOfStock>0?'negative':'positive'}">${outOfStock}</div></div>
  </div>`;

  html += `<div class="card"><div class="card-header"><h2>庫存查詢</h2>
    <input class="search-input" id="invSearch" placeholder="搜尋商品..." oninput="renderPage()"></div><div class="card-body">`;

  const q = (document.getElementById('invSearch')?.value || '').toLowerCase();
  const filtered = q ? products.filter(p => p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q)) : products;

  html += `<table class="data-table"><thead><tr><th>代碼</th><th>商品名稱</th><th class="num">庫存數量</th><th>單位</th><th class="num">成本單價</th><th class="num">庫存金額</th><th>狀態</th></tr></thead><tbody>`;
  for (const p of filtered) {
    const statusClass = p.stock <= 0 ? 'badge-danger' : (p.stock <= p.minStock ? 'badge-warning' : 'badge-success');
    const statusText = p.stock <= 0 ? '缺貨' : (p.stock <= p.minStock ? '⚠ 低於安全存量' : '正常');
    html += `<tr><td style="font-family:var(--font-mono);font-size:12px;">${p.code}</td><td>${p.name}</td>
      <td class="num" style="font-weight:700;font-size:15px;">${p.stock}</td><td>${p.unit}</td>
      <td class="num">${fmtMoney(p.cost)}</td><td class="num">${fmtMoney(p.stock*p.cost)}</td>
      <td><span class="badge ${statusClass}">${statusText}</span></td></tr>`;
  }
  html += `</tbody></table></div></div>`;
  return html;
}

function expXLSX(data, fn) { if(!data||data.length===0){alert('無資料可匯出');return;} const ws=XLSX.utils.json_to_sheet(data); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Sheet1'); XLSX.writeFile(wb,fn+'.xlsx'); }
function impXLSX(cb) { const i=document.createElement('input'); i.type='file'; i.accept='.xlsx,.xls'; i.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ try{ const wb=XLSX.read(ev.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const d=XLSX.utils.sheet_to_json(ws); if(d.length===0){alert('無資料');return;} cb(d); }catch(err){alert('讀取失敗:'+err.message);} }; r.readAsArrayBuffer(f); }; i.click(); }

    case 'suppliers': h=eb("exportSuppliers()","匯出供應商")+ib("importSuppliers()","匯入供應商"); break;

// ── Import Opening Balances (期初餘額匯入) ──
function importOpeningBalances(){ impXLSX(async data=>{
  const date = data.length>0 && data[0].日期 ? String(data[0].日期).substring(0,10) : new Date().toISOString().split('T')[0];
  const obs = []; let totalDr = 0, totalCr = 0;
  data.forEach(r=>{
    if(!r.科目) return;
    const accId = accounts.find(a=>r.科目&&(a.code+' '+a.name===r.科目||a.name===r.科目||a.code===r.科目));
    if(!accId) return;
    const dr = Number(r.借方金額)||0;
    const cr = Number(r.貸方金額)||0;
    obs.push({acc:accId.id, debit:dr, credit:cr});
    totalDr += dr; totalCr += cr;
  });
  if(obs.length===0){ alert('無有效科目資料'); return; }
  openingBalances = obs;
  openingDate = date;
  await save('openingBalances', openingBalances);
  await save('openingDate', [{id:'od',date:date}]);
  // Auto-generate opening journal entry
  const voucher = date.replace(/-/g,'').slice(2)+'-OPEN';
  const lines = obs.filter(o=>o.debit>0||o.credit>0).map(o=>({acc:o.acc, debit:o.debit, credit:o.credit}));
  const diff = totalDr - totalCr;
  if(Math.abs(diff)>0.5){
    if(diff > 0) lines.push({acc:'e2', debit:0, credit:diff});
    else lines.push({acc:'e2', debit:-diff, credit:0});
  }
  const je = {id:genId(), date, voucher, desc:'期初開帳', lines};
  const idx = journalEntries.findIndex(j=>j.voucher===voucher);
  if(idx>=0) journalEntries[idx]=je; else journalEntries.push(je);
  await save('journalEntries', journalEntries);
  alert('已匯入 '+obs.length+' 筆期初餘額（日期：'+date+'）\n開帳傳票：'+voucher);
  renderPage();
}); }

function importCustomers(){ impXLSX(data=>{ data.forEach(r=>{ if(r.代碼&&r.名稱){ const ex=customers.find(c=>c.code===String(r.代碼)); const nd={code:String(r.代碼),name:r.名稱,contact:r.聯絡人||'',phone:r.電話||'',addr:r.地址||''}; if(ex){Object.assign(ex,nd);} else{customers.push({id:genId(),...nd});} } }); save('customers',customers); renderPage(); }); }

// Import journal entries from Excel
function importJournal(){ impXLSX(data=>{ const entries={}; data.forEach(r=>{ if(!r.日期||!r.傳票編號) return; const v=r.傳票編號.toString().trim(); if(!entries[v]){ entries[v]={id:genId(),date:r.日期.toString().substring(0,10),voucher:v,desc:r.摘要||'',lines:[]}; } const dr=Number(r.借方金額)||0; const cr=Number(r.貸方金額)||0; if(dr>0||cr>0){ const accId=accounts.find(a=>r.科目&&(a.code+' '+a.name===r.科目||a.name===r.科目||a.code===r.科目)); entries[v].lines.push({acc:accId?accId.id:'',debit:dr,credit:cr}); } }); Object.values(entries).forEach(e=>{ if(e.lines.length>=2){ const idx=journalEntries.findIndex(j=>j.voucher===e.voucher); if(idx>=0) journalEntries[idx]=e; else journalEntries.push(e); } }); save('journalEntries',journalEntries); renderPage(); }); }

//  COMMON
// ═══════════════════════════════════════════════
function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  STATE.editingId = null;
}

function bindPageEvents() {
  // Search for chart of accounts
  const coaSearch = document.getElementById('coaSearch');
  if (coaSearch) {
    coaSearch.addEventListener('input', () => {
      const q = coaSearch.value.toLowerCase();
      document.querySelectorAll('.report-section').forEach(sec => {
        const has = Array.from(sec.querySelectorAll('tbody tr')).some(tr => tr.textContent.toLowerCase().includes(q));
        sec.style.display = has || !q ? '' : 'none';
      });
    });
  }
}

// ── Init ──
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Click outside to close user dropdown
document.addEventListener('click', () => {
  document.getElementById('userDropdown').classList.remove('show');
});

// Clock
setInterval(() => {
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
  document.getElementById('sidebarClock').textContent = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}, 1000);

// Keyboard shortcut: Escape to close modal
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// Enter key for login
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('loginOverlay').classList.contains('hidden')) {
    doLogin();
  }
});

// Async init
(async function init() {
  try { await initData(); } catch(e) {
    // IndexedDB unavailable, load from localStorage
    accounts = JSON.parse(localStorage.getItem('erp_accounts')||'null')||DEFAULT_ACCOUNTS;
    journalEntries = JSON.parse(localStorage.getItem('erp_journalEntries')||'null')||[];
    products = JSON.parse(localStorage.getItem('erp_products')||'null')||DEFAULT_PRODUCTS;
    suppliers = JSON.parse(localStorage.getItem('erp_suppliers')||'null')||DEFAULT_SUPPLIERS;
    customers = JSON.parse(localStorage.getItem('erp_customers')||'null')||DEFAULT_CUSTOMERS;
    purchaseOrders = JSON.parse(localStorage.getItem('erp_purchaseOrders')||'null')||[];
    salesOrders = JSON.parse(localStorage.getItem('erp_salesOrders')||'null')||[];
    users = JSON.parse(localStorage.getItem('erp_users')||'null')||DEFAULT_USERS;
    DB = null;
  }

  // Check license
  const savedLicense = DB ? await dbLoad('license') : JSON.parse(localStorage.getItem('erp_license')||'null');
  if (!savedLicense || savedLicense.length === 0) {
    showLicenseModal(); return;
  }
  const lic = savedLicense[0];
  // Free tier: skip crypto verification, use stored data directly
  if (lic.tier === 1 || (lic.key && lic.key.startsWith('FREE'))) {
    STATE.license = { valid:true, tier:1, tierName:'免費版', company:lic.company||'免費試用', key:lic.key||'FREE', expiry:'永久' };
  } else {
    const result = await verifyLicenseAsync(lic.key, lic.company);
    if (!result.valid) {
      showLicenseModal('授權已失效：' + result.reason); return;
    }
    STATE.license = result;
  }
  updateLicenseDisplay();

  // Free version: auto-login, skip login screen
  if (STATE.license && STATE.license.tier === 1) {
    currentUser = { id:'free', username:'訪客', role:'免費版' };
    sessionStorage.setItem('erp_session', JSON.stringify({id:'free', username:'訪客', role:'免費版'}));
    updateUserDisplay();
    document.getElementById('loginOverlay').classList.add('hidden');
    renderPage();
    return;
  }

  if (checkLogin()) {
    updateUserDisplay();
    document.getElementById('loginOverlay').classList.add('hidden');
  } else {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('loginUsername').focus();
  }
  renderPage();
})();
</script>
